name: Reusable Maven CI Release

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        default: '21'
    secrets:
      NEXUS_LOGIN:
        required: true
      NEXUS_PASSWORD:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: temurin

      - name: Configure Maven settings (Nexus)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>${{ secrets.NEXUS_LOGIN }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>nexus</id>
                <mirrorOf>*</mirrorOf>
                <url>${{ vars.NEXUS_URL }}/repository/maven-public/</url>
              </mirror>
            </mirrors>
            <profiles>
              <profile>
                <id>nexus</id>
                <properties>
                  <!-- Timeout en ms -->
                  <maven.wagon.http.pool>false</maven.wagon.http.pool>
                  <maven.wagon.httpconnectionManager.ttlSeconds>120</maven.wagon.httpconnectionManager.ttlSeconds>
                  <maven.wagon.http.retryHandler.count>5</maven.wagon.http.retryHandler.count>
                </properties>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>nexus</activeProfile>
            </activeProfiles>
          </settings>
          EOF
      
      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build & Test
        run: mvn clean verify --no-transfer-progress

      - name: Get current version
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "snapshot_version=$VERSION" >> $GITHUB_OUTPUT
          # Si déjà une release (pas SNAPSHOT), on la prend telle quelle
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            RELEASE_VERSION=${VERSION%-SNAPSHOT}
          else
            RELEASE_VERSION=$VERSION
          fi
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: |
          mvn versions:set -DnewVersion=${{ steps.get_version.outputs.release_version }} \
            -DgenerateBackupPoms=false --no-transfer-progress

      - name: Commit & push release version
        run: |
          git add pom.xml "**/pom.xml" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "pom.xml already at release version, nothing to commit"
          else
            git commit -m "🔖 release ${{ steps.get_version.outputs.release_version }} [skip ci]"
            git push origin HEAD
          fi

      - name: Deploy artifact to Nexus
        if: inputs.publishable == true
        run: |
          mvn deploy -DskipTests --no-transfer-progress \
            -DaltDeploymentRepository=nexus::${{ vars.NEXUS_URL }}/repository/maven-releases/

      - name: Build only (sans publish)
        if: inputs.publishable == false
        run: mvn package -DskipTests --no-transfer-progress

      - name: Tag release
        run: |
          git tag v${{ steps.get_version.outputs.release_version }}
          git push origin v${{ steps.get_version.outputs.release_version }}
