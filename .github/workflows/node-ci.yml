name: Reusable JS CI

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '24'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Configure .npmrc for GitHub Packages
        run: |
          cat > .npmrc <<EOF
          @Rawz06-Studio:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=\${{ secrets.GITHUB_TOKEN }}
          always-auth=true
          EOF

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Check available scripts
        id: check_scripts
        run: |
          HAS_LINT=$(node -e "const p=require('./package.json'); console.log(p.scripts?.lint ? 'true' : 'false')")
          HAS_TEST=$(node -e "const p=require('./package.json'); console.log(p.scripts?.test ? 'true' : 'false')")
          HAS_BUILD=$(node -e "const p=require('./package.json'); console.log(p.scripts?.build ? 'true' : 'false')")
          echo "has_lint=$HAS_LINT" >> $GITHUB_OUTPUT
          echo "has_test=$HAS_TEST" >> $GITHUB_OUTPUT
          echo "has_build=$HAS_BUILD" >> $GITHUB_OUTPUT

      - name: Lint
        if: steps.check_scripts.outputs.has_lint == 'true'
        run: pnpm run lint

      - name: Test
        if: steps.check_scripts.outputs.has_test == 'true'
        run: pnpm run test

      - name: Build
        if: steps.check_scripts.outputs.has_build == 'true'
        run: pnpm run build
