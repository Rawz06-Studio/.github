name: Reusable JS CI Release

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '22'
      publishable:
        required: false
        type: boolean
        default: false
        description: 'Publier le package sur Nexus (true pour les libs)'
    secrets:
      NEXUS_LOGIN:
        required: true
      NEXUS_PASSWORD:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Configure .npmrc for Nexus
        run: |
          TOKEN=$(echo -n "${{ secrets.NEXUS_LOGIN }}:${{ secrets.NEXUS_PASSWORD }}" | base64)
          cat > .npmrc <<EOF
          registry=${{ vars.NEXUS_URL }}/repository/npm-proxy/
          //${{ vars.NEXUS_DOMAIN }}/repository/npm-proxy/:_auth=${TOKEN}
          //${{ vars.NEXUS_DOMAIN }}/repository/npm-hosted/:_auth=${TOKEN}
          always-auth=true
          EOF

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check available scripts
        id: check_scripts
        run: |
          HAS_LINT=$(node -e "const p=require('./package.json'); console.log(p.scripts?.lint ? 'true' : 'false')")
          HAS_TEST=$(node -e "const p=require('./package.json'); console.log(p.scripts?.test ? 'true' : 'false')")
          echo "has_lint=$HAS_LINT" >> $GITHUB_OUTPUT
          echo "has_test=$HAS_TEST" >> $GITHUB_OUTPUT

      - name: Lint
        if: steps.check_scripts.outputs.has_lint == 'true'
        run: pnpm run lint

      - name: Test
        if: steps.check_scripts.outputs.has_test == 'true'
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Bump patch version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Publish to Nexus
        if: inputs.publishable == true
        run: pnpm publish --no-git-checks --access public --registry ${{ vars.NEXUS_URL }}/repository/npm-hosted/

      - name: Commit & Tag
        run: |
          git add package.json
          git add pnpm-lock.yaml 2>/dev/null || true
          git commit -m "🔖 release ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin HEAD
          git push origin ${{ steps.bump.outputs.new_version }}

