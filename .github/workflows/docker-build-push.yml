name: Reusable Docker Build Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      dokploy_app_id:
        required: false
        type: string
        default: ''
    secrets:
      DOKPLOY_TOKEN:
        required: false

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Pull latest changes
        run: git pull 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/rawz06-studio/${{ inputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Trigger Dokploy Deploy
        if: ${{ inputs.dokploy_app_id != '' }}
        run: |
          curl -X POST https://dokploy.admin.rawz06.fr/api/application.deploy \
            -H "accept: application/json" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ inputs.dokploy_app_id }}"}'

