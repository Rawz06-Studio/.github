name: Reusable Docker Build Push

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      dokploy_app_id:
        required: false
        type: string
        default: ''
    secrets:
      NEXUS_LOGIN:
        required: true
      NEXUS_PASSWORD:
        required: true
      DOKPLOY_TOKEN:
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Nexus Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_DOMAIN }}
          username: ${{ secrets.NEXUS_LOGIN }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_DOMAIN }}/${{ inputs.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Trigger Dokploy Deploy
        if: ${{ inputs.dokploy_app_id != '' }}
        run: |
          curl -X POST https://dokploy.admin.rawz06.fr/api/application.deploy \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ inputs.dokploy_app_id }}"}'
