name: Reusable Maven CI

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        default: '21'
    secrets:
      NEXUS_LOGIN:
        required: false
      NEXUS_PASSWORD:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java_version }}
          distribution: temurin

      - name: Configure Maven settings (Nexus)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>${{ secrets.NEXUS_LOGIN }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
            <mirrors>
              <mirror>
                <id>nexus</id>
                <mirrorOf>*</mirrorOf>
                <url>${{ vars.NEXUS_URL }}/repository/maven-public/</url>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Build & Test
        run: mvn clean verify --no-transfer-progress
