name: Reusable Maven CI Release

on:
  workflow_call:
    inputs:
      java_version:
        required: false
        type: string
        default: '21'
      publishable:
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: temurin

      - name: Configure Maven settings (GitHub Packages)
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>\${{ github.actor }}</username>
                <password>\${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build & Test
        run: mvn clean verify --no-transfer-progress

      - name: Get current version
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "snapshot_version=$VERSION" >> $GITHUB_OUTPUT
          # Si déjà une release (pas SNAPSHOT), on la prend telle quelle
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            RELEASE_VERSION=${VERSION%-SNAPSHOT}
          else
            RELEASE_VERSION=$VERSION
          fi
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next SNAPSHOT version
        id: next_version
        run: |
          RELEASE="${{ steps.get_version.outputs.release_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASE"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))-SNAPSHOT"
          echo "next_snapshot=$NEXT" >> $GITHUB_OUTPUT

      - name: Set next SNAPSHOT version
        run: |
          mvn versions:set -DnewVersion=${{ steps.next_version.outputs.next_snapshot }} \
            -DgenerateBackupPoms=false --no-transfer-progress

      - name: Commit & push release version
        run: |
          git add pom.xml "**/pom.xml" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "pom.xml already at release version, nothing to commit"
          else
            git commit -m "🔖 snapshot ${{ steps.get_version.outputs.release_version }} [skip ci]"
            git push origin HEAD
          fi

      - name: Deploy artifact to GitHub Packages
        if: inputs.publishable == true
        run: |
          mvn deploy -DskipTests --no-transfer-progress \
            -DaltSnapshotDeploymentRepository=github::https://maven.pkg.github.com/Rawz06-Studio/${GITHUB_REPOSITORY#*/}

      - name: Build only (sans publish)
        if: inputs.publishable == false
        run: mvn package -DskipTests --no-transfer-progress
